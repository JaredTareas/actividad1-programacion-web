<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>

    <link rel="stylesheet" href="css/ejercicio16.css">
</head>

<body>

    <div class="contenedor">
        <h2>Calculadora</h2>

        <label>Número 1:</label>
        <input type="text" id="numero1" placeholder="Ingresa el primer número">

        <label>Número 2:</label>
        <input type="text" id="numero2" placeholder="Ingresa el segundo número">

        <button onclick="calcularOperacion('suma')">Sumar</button>
        <button onclick="calcularOperacion('resta')">Restar</button>
        <button onclick="calcularOperacion('multiplicacion')">Multiplicar</button>
        <button onclick="calcularOperacion('division')">Dividir</button>

        <label>Resultado:</label>
        <input type="text" id="resultado" readonly>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ejercicio16.js"></script>
</body>
</html>
