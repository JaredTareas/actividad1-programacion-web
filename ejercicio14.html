<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayor, Menor y Promedio</title>

    <link rel="stylesheet" href="css/ejercicio14.css">
</head>

<body>

    <div class="contenedor">
        <h2>Calcular números</h2>

        <label>Ingresa números separados por comas:</label>
        <input type="text" id="numeros" placeholder="Ejemplo: 1,2,3">

        <button onclick="calcular()">Calcular</button>

        <label>Número mayor:</label>
        <input type="text" id="mayor" readonly>

        <label>Número menor:</label>
        <input type="text" id="menor" readonly>

        <label>Promedio:</label>
        <input type="text" id="promedio" readonly>
    </div>

    <script src="js/ejercicio14.js"></script>
</body>
</html>
